<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Socialclub - Share Your Thoughts</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #100F19;
      color: #fff;
      opacity: 0;
      animation: pageFadeIn 0.4s ease forwards;
    }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      background-color: #00000A;
      text-align: center;
      padding: 1.75rem 1rem 1.1rem;
    }
    .header h1 { font-size: 2.4rem; font-weight: 700; }
    .header h1 a { text-decoration: none; color: #fff; transition: color 0.2s; }
    .header h1 a:hover { color: #ccc; }
    .header .page-tagline {
      font-size: 0.85rem;
      color: #777;
      margin-top: 0.4rem;
      letter-spacing: 0.02em;
    }

    /* Caja para compartir publicación */
    .share-box {
      background: linear-gradient(180deg, #201F28, #171620);
      color: #fff;
      margin: 1.75rem auto;
      padding: 1.25rem;
      border-radius: 16px;
      width: 90%;
      max-width: 560px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06);
    }

    .composer-top { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.9rem; }
    .avatar-circle {
      border-radius: 50%;
      background-color: #3F3D46;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #F5F5F7;
      flex-shrink: 0;
    }
    .composer-avatar { width: 40px; height: 40px; font-size: 0.95rem; }
    .composer-username { font-weight: 600; font-size: 0.95rem; color: #ddd; }

    .share-box textarea {
      width: 100%;
      min-height: 90px;
      margin-bottom: 0.9rem;
      padding: 0.8rem;
      border-radius: 12px;
      border: 2px solid transparent;
      outline: none;
      background-color: #100F19;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      transition: border-color 0.2s;
    }
    .share-box textarea:focus { border-color: #F5F5F7; }
    .share-box textarea::placeholder { color: #777; }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }
    .file-upload label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background-color: #2F2E37;
      color: #fff;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    .file-upload label:hover { background-color: #3F3D46; }
    .file-upload input[type="file"] { display: none; }
    .char-count { font-size: 0.78rem; color: #777; }

    .image-preview-wrap { position: relative; display: none; margin-bottom: 0.9rem; }
    .image-preview-wrap.show { display: block; }
    .image-preview-wrap img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; display: block; }
    .image-preview-remove {
      position: absolute; top: 8px; right: 8px;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      background-color: rgba(0,0,0,0.65); color: #fff;
      border-radius: 50%; cursor: pointer; font-size: 0.8rem;
    }
    .image-preview-remove:hover { background-color: rgba(0,0,0,0.85); }

    .share-box button.post-submit {
      width: 100%;
      padding: 0.8rem;
      background-color: #F5F5F7;
      color: #100F19;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.15s, opacity 0.2s;
    }
    .share-box button.post-submit:hover:not(:disabled) { background-color: #E3E3E8; }
    .share-box button.post-submit:active:not(:disabled) { transform: scale(0.98); }
    .share-box button.post-submit:disabled { opacity: 0.5; cursor: default; }

    /* Feed */
    #postsContainer {
      width: 90%;
      max-width: 560px;
      margin: 0 auto 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .empty-state { text-align: center; color: #777; font-size: 0.95rem; padding: 2.5rem 1rem; }

    .post {
      background-color: #201F28;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
      transition: box-shadow 0.2s ease;
    }
    .post:hover { box-shadow: 0 12px 28px rgba(0,0,0,0.35); }
    .post.just-posted { animation: postIn 0.45s cubic-bezier(0.22, 1, 0.36, 1); }
    @keyframes postIn {
      from { opacity: 0; transform: translateY(-14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .post-top { display: flex; align-items: center; gap: 0.7rem; padding: 0.9rem 1rem 0.6rem; }
    .post-avatar { width: 42px; height: 42px; font-size: 0.9rem; }
    .post-user-text { display: flex; flex-direction: column; }
    .post-username { font-weight: 700; color: #F5F5F7; font-size: 0.95rem; }
    .post-timestamp { font-size: 0.75rem; color: #777; margin-top: 0.1rem; }

    .post-body { padding: 0 1rem 0.9rem; }
    .post-body p { margin-bottom: 0.7rem; line-height: 1.5; color: #eee; white-space: pre-wrap; }
    .post-body img { width: 100%; border-radius: 10px; margin-top: 0.3rem; display: block; }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 1.75rem;
      padding: 0.5rem 1rem 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 0.2rem;
      padding-top: 0.7rem;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.25rem 0.4rem;
      border-radius: 8px;
      transition: color 0.2s, transform 0.15s;
    }
    .action-btn:hover { color: #ccc; }
    .action-btn:active { transform: scale(0.92); }
    .action-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .action-btn.liked { color: #F5F5F7; }
    .action-btn.liked svg { fill: #F5F5F7; }
    .action-btn.reposted { color: #F5F5F7; }
    .action-btn.saved { color: #F5F5F7; }
    .action-btn.saved svg { fill: #F5F5F7; }
    .action-btn.save-action { margin-left: auto; }

    /* Toast */
    .focus-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translate(-50%, 16px);
      background-color: #201F28;
      color: #F5F5F7;
      padding: 0.8rem 1.4rem;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      text-align: center;
      max-width: 85%;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.07);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 1200;
    }
    .focus-toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* Footer */
    .footer { background-color: #00000A; padding: 1rem 0; text-align: center; }
    .bottom-nav { display: flex; justify-content: space-around; align-items: center; }
    .nav-item a {
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: #fff;
      padding: 0.3rem 0.9rem; border-radius: 12px;
      transition: background-color 0.2s, opacity 0.2s;
    }
    .nav-item span { font-size: 0.9rem; margin-top: 0.5rem; }
    .nav-item a:hover { opacity: 0.85; }
    .nav-item.active a { background-color: rgba(255,255,255,0.06); }
    .image {
      width: 50px; height: 50px; margin-bottom: 0.5rem;
      overflow: hidden; border-radius: 50%; background-color: #201F28;
    }
    .image img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

  <header class="header">
    <h1><a href="index.html">Focus.</a></h1>
    <div class="page-tagline">Socialclub — share the wins that keep you going</div>
  </header>

  <section class="share-box">
    <div class="composer-top">
      <div class="avatar-circle composer-avatar" id="composerAvatar"></div>
      <span class="composer-username" id="composerUsername">@FocusUser</span>
    </div>

    <textarea id="postText" placeholder="Share your Focus. thoughts..." maxlength="500"></textarea>

    <div class="image-preview-wrap" id="imagePreviewWrap">
      <img id="imagePreviewImg" src="" alt="Preview">
      <div class="image-preview-remove" id="imagePreviewRemove">✕</div>
    </div>

    <div class="composer-footer">
      <div class="file-upload">
        <label for="postImage">📷 Attach Image</label>
        <input type="file" id="postImage" accept="image/*">
      </div>
      <span class="char-count" id="charCount">0 / 500</span>
    </div>

    <button class="post-submit" id="postButton">Post</button>
  </section>

  <section id="postsContainer"></section>

  <footer class="footer">
    <nav class="bottom-nav">
      <div class="nav-item">
        <a href="memories.html">
          <div class="image"><img src="memories.webp" alt="Memories"></div>
          <span>Memories.</span>
        </a>
      </div>
      <div class="nav-item active">
        <a href="socialclub.html">
          <div class="image"><img src="person.png" alt="Socialclub"></div>
          <span>Socialclub.</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="communities.html">
          <div class="image"><img src="communities.png" alt="Communities"></div>
          <span>Communities.</span>
        </a>
      </div>
    </nav>
  </footer>

  <div class="focus-toast" id="focusToast"></div>

  <script type="module">
    import {
      requireAuth, loadUserDoc,
      createPost, getFeedPosts, getUserInteractions,
      toggleLike, toggleRepost, toggleSave
    } from "./firebase-init.js";

    const user = await requireAuth();
    const uid = user.uid;

    const postText           = document.getElementById('postText');
    const postImage          = document.getElementById('postImage');
    const postButton         = document.getElementById('postButton');
    const postsContainer     = document.getElementById('postsContainer');
    const charCount          = document.getElementById('charCount');
    const imagePreviewWrap   = document.getElementById('imagePreviewWrap');
    const imagePreviewImg    = document.getElementById('imagePreviewImg');
    const imagePreviewRemove = document.getElementById('imagePreviewRemove');
    const composerAvatar     = document.getElementById('composerAvatar');
    const composerUsername   = document.getElementById('composerUsername');
    const focusToast         = document.getElementById('focusToast');

    let toastTimer;
    function showToast(message) {
      focusToast.textContent = message;
      focusToast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => focusToast.classList.remove('show'), 2400);
    }

    // ICONOS (SVG en línea, sin dependencias externas)
    const ICONS = {
      heart: `<svg viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" fill="none"><path d="M12 21s-6.7-4.35-9.33-8.28C.86 10.06 1.6 6.6 4.6 5.2c2.13-.99 4.43-.2 5.7 1.6.4.57.7 1.2.7 1.2s.3-.63.7-1.2c1.27-1.8 3.57-2.59 5.7-1.6 3 1.4 3.74 4.86 1.93 7.52C18.7 16.65 12 21 12 21z"/></svg>`,
      repost: `<svg viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`,
      bookmark: `<svg viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" fill="none"><path d="M6 4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18l-6-4-6 4V4z"/></svg>`
    };

    // Perfil del usuario actual (para el composer y los posts que publique)
    const savedData = await loadUserDoc(uid);
    const profileInfo = savedData.profileInfo || {};
    const displayName = profileInfo.userName || profileInfo.realName || "FocusUser";
    const myInitial = displayName.charAt(0).toUpperCase();

    function applyAvatar(el, avatarUrl, initial) {
      if (avatarUrl) {
        el.style.backgroundImage = `url(${avatarUrl})`;
        el.textContent = "";
      } else {
        el.style.backgroundImage = "none";
        el.textContent = initial;
      }
    }
    applyAvatar(composerAvatar, profileInfo.profilePic, myInitial);
    composerUsername.textContent = "@" + displayName;

    // Cargamos el feed GLOBAL (posts de todos los usuarios)
    let posts = await getFeedPosts(30);
    let interactions = {}; // { postId: { liked, reposted, saved } }

    await Promise.all(posts.map(async (post) => {
      interactions[post.id] = await getUserInteractions(post.id, uid);
    }));

    renderPosts();

    function formatRelativeTime(post) {
      if (!post.createdAt || typeof post.createdAt.toDate !== 'function') return "Just now";
      const diffMs = Date.now() - post.createdAt.toDate().getTime();
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return "Just now";
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function renderPosts(animateFirst = false) {
      if (posts.length === 0) {
        postsContainer.innerHTML = `<p class="empty-state">No posts yet — be the first to share a Focus moment.</p>`;
        return;
      }

      postsContainer.innerHTML = posts.map((post, i) => {
        const inter = interactions[post.id] || { liked: false, reposted: false, saved: false };
        const initial = (post.authorName || "F").charAt(0).toUpperCase();
        return `
        <article class="post ${animateFirst && i === 0 ? 'just-posted' : ''}">
          <div class="post-top">
            <div class="avatar-circle post-avatar" style="${post.authorAvatar ? `background-image:url(${post.authorAvatar})` : ''}">
              ${post.authorAvatar ? '' : initial}
            </div>
            <div class="post-user-text">
              <span class="post-username">@${escapeHtml(post.authorName || 'FocusUser')}</span>
              <span class="post-timestamp">${formatRelativeTime(post)}</span>
            </div>
          </div>
          <div class="post-body">
            <p>${escapeHtml(post.text)}</p>
            ${post.image ? `<img src="${post.image}" alt="Post Image">` : ''}
          </div>
          <div class="post-actions">
            <button class="action-btn like-btn ${inter.liked ? 'liked' : ''}" data-post-id="${post.id}">
              ${ICONS.heart}
              <span class="count">${post.likesCount || 0}</span>
            </button>
            <button class="action-btn repost-btn ${inter.reposted ? 'reposted' : ''}" data-post-id="${post.id}">
              ${ICONS.repost}
              <span class="count">${post.repostsCount || 0}</span>
            </button>
            <button class="action-btn save-action ${inter.saved ? 'saved' : ''}" data-post-id="${post.id}">
              ${ICONS.bookmark}
            </button>
          </div>
        </article>
      `;
      }).join('');
    }

    // Delegación de eventos para like / repost / guardar
    postsContainer.addEventListener('click', async (e) => {
      const likeBtn = e.target.closest('.like-btn');
      const repostBtn = e.target.closest('.repost-btn');
      const saveBtn = e.target.closest('.save-action');

      if (likeBtn) {
        const postId = likeBtn.dataset.postId;
        const post = posts.find(p => p.id === postId);
        const wasLiked = interactions[postId].liked;
        interactions[postId].liked = !wasLiked;
        post.likesCount = (post.likesCount || 0) + (wasLiked ? -1 : 1);
        renderPosts();
        try {
          await toggleLike(postId, uid, wasLiked);
        } catch (err) {
          console.error(err);
          showToast("Couldn't update like. Try again.");
        }
      }

      if (repostBtn) {
        const postId = repostBtn.dataset.postId;
        const post = posts.find(p => p.id === postId);
        const wasReposted = interactions[postId].reposted;
        interactions[postId].reposted = !wasReposted;
        post.repostsCount = (post.repostsCount || 0) + (wasReposted ? -1 : 1);
        renderPosts();
        showToast(wasReposted ? "Repost removed" : "Reposted!");
        try {
          await toggleRepost(postId, uid, wasReposted);
        } catch (err) {
          console.error(err);
          showToast("Couldn't update repost. Try again.");
        }
      }

      if (saveBtn) {
        const postId = saveBtn.dataset.postId;
        const post = posts.find(p => p.id === postId);
        const wasSaved = interactions[postId].saved;
        interactions[postId].saved = !wasSaved;
        renderPosts();
        showToast(wasSaved ? "Removed from saved" : "Saved!");
        try {
          await toggleSave(uid, postId, post, wasSaved);
        } catch (err) {
          console.error(err);
          showToast("Couldn't save post. Try again.");
        }
      }
    });

    postText.addEventListener('input', () => {
      charCount.textContent = `${postText.value.length} / 500`;
    });

    postImage.addEventListener('change', () => {
      const file = postImage.files[0];
      if (!file) { imagePreviewWrap.classList.remove('show'); return; }
      const reader = new FileReader();
      reader.onload = () => {
        imagePreviewImg.src = reader.result;
        imagePreviewWrap.classList.add('show');
      };
      reader.readAsDataURL(file);
    });

    imagePreviewRemove.addEventListener('click', () => {
      postImage.value = '';
      imagePreviewWrap.classList.remove('show');
    });

    async function savePost() {
      const textValue = postText.value.trim();
      if (!textValue && !postImage.files[0]) {
        showToast("Write something or attach an image first.");
        return;
      }

      postButton.disabled = true;
      postButton.textContent = "Posting...";

      const finishSave = async (imageData) => {
        const newPostData = { text: textValue, image: imageData || null };
        try {
          const newId = await createPost(uid, { name: displayName, avatar: profileInfo.profilePic }, newPostData);
          posts.unshift({
            id: newId,
            authorId: uid,
            authorName: displayName,
            authorAvatar: profileInfo.profilePic || null,
            text: textValue,
            image: imageData || null,
            likesCount: 0,
            repostsCount: 0,
            createdAt: null
          });
          interactions[newId] = { liked: false, reposted: false, saved: false };
          renderPosts(true);
          postText.value = '';
          postImage.value = '';
          imagePreviewWrap.classList.remove('show');
          charCount.textContent = "0 / 500";
          showToast("Posted to Socialclub!");
        } catch (err) {
          console.error(err);
          showToast("Couldn't publish your post. Try again.");
        } finally {
          postButton.disabled = false;
          postButton.textContent = "Post";
        }
      };

      if (postImage.files[0]) {
        const reader = new FileReader();
        reader.onload = () => finishSave(reader.result);
        reader.readAsDataURL(postImage.files[0]);
      } else {
        finishSave(null);
      }
    }

    postButton.addEventListener('click', savePost);

    /* -- Transición dinámica entre páginas -- */
    document.querySelectorAll('.nav-item a, .header h1 a').forEach(link => {
      link.addEventListener('click', (e) => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#')) return;
        e.preventDefault();
        document.body.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
        document.body.style.opacity = '0';
        document.body.style.transform = 'translateY(-6px)';
        setTimeout(() => { window.location.href = href; }, 200);
      });
    });
  </script>
</body>
</html>
